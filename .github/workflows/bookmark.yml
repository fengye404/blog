name: Bookmark

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write

concurrency:
  group: bookmark
  cancel-in-progress: false

jobs:
  bookmark:
    if: contains(github.event.issue.labels.*.name, 'bookmark')
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          ref: hexo-source

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install requests

      - name: Clone fengye-skills (unified skill scripts)
        run: |
          git clone --depth 1 https://github.com/fengye404/fengye-skills.git /tmp/fengye-skills

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run bookmark agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          X_AUTH_TOKEN: ${{ secrets.X_AUTH_TOKEN }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          claude -p "请严格按照 CLAUDE.md 中的收藏工作流，收藏以下 URL。
          不要跳过任何步骤，必须调用 python3 脚本抓取内容。

          URL: ${ISSUE_TITLE}
          备注: ${ISSUE_BODY}

          环境信息：
          - X_AUTH_TOKEN 已通过环境变量设置，fetch_tweet.py 会自动读取
          - Skill 脚本位于 /tmp/fengye-skills/
          - fetch_tweet.py 路径: /tmp/fengye-skills/fengye-x-fetch/scripts/fetch_tweet.py
          - fetch_markdown.py 路径: /tmp/fengye-skills/fengye-markdown-fetch/scripts/fetch_markdown.py

          完成后用 git add -A && git commit 提交所有变更（不要 add /tmp 下的文件）。" \
            --model kimi-k2.5 \
            --max-turns 30 \
            --allowedTools "Bash(python3:*)" "Bash(mkdir:*)" "Bash(ls:*)" "Bash(cat:*)" "Bash(git:*)" "Bash(head:*)" "Bash(wc:*)" "Bash(grep:*)" "Bash(sed:*)" "Bash(cp:*)" "Edit" "Read" "Write"

      - name: Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin hexo-source || true
          git push origin hexo-source || echo "Nothing to push"

      - name: Close issue with comment
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '✅ 已收藏！文章已保存到仓库。'
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });

name: Bookmark

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to bookmark'
        required: true
      note:
        description: 'Note (optional)'
        required: false
        default: ''

permissions:
  contents: write
  issues: write

concurrency:
  group: bookmark
  cancel-in-progress: false

jobs:
  # Guard: close and reject issues from non-owner
  guard:
    if: github.event_name == 'issues' && github.event.issue.user.login != github.repository_owner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '⛔ 仅仓库所有者可使用此功能。'
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });

  bookmark:
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'bookmark') && github.event.issue.user.login == github.repository_owner)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          ref: hexo-source

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install requests

      - name: Clone fengye-skills (unified skill scripts)
        run: |
          git clone --depth 1 https://github.com/fengye404/fengye-skills.git /tmp/fengye-skills

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Set URL and note from trigger
        id: params
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "url=${{ github.event.inputs.url }}" >> "$GITHUB_OUTPUT"
            echo "note=${{ github.event.inputs.note }}" >> "$GITHUB_OUTPUT"
          else
            echo "url=$ISSUE_TITLE" >> "$GITHUB_OUTPUT"
            echo "note=$ISSUE_BODY" >> "$GITHUB_OUTPUT"
          fi
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}

      - name: Run bookmark agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          X_AUTH_TOKEN: ${{ secrets.X_AUTH_TOKEN }}
          BOOKMARK_URL: ${{ steps.params.outputs.url }}
          BOOKMARK_NOTE: ${{ steps.params.outputs.note }}
        run: |
          claude -p "请严格按照 CLAUDE.md 中的收藏工作流，收藏以下 URL。
          不要跳过任何步骤，必须调用 python3 脚本抓取内容。

          URL: ${BOOKMARK_URL}
          备注: ${BOOKMARK_NOTE}

          环境信息：
          - X_AUTH_TOKEN 已通过环境变量设置，fetch_tweet.py 会自动读取
          - Skill 脚本位于 /tmp/fengye-skills/
          - fetch_tweet.py 路径: /tmp/fengye-skills/fengye-x-fetch/scripts/fetch_tweet.py
          - fetch_markdown.py 路径: /tmp/fengye-skills/fengye-markdown-fetch/scripts/fetch_markdown.py

          完成后用 git add -A && git commit 提交所有变更（不要 add /tmp 下的文件）。" \
            --model kimi-k2.5 \
            --max-turns 30 \
            --allowedTools "Bash(python3:*)" "Bash(mkdir:*)" "Bash(ls:*)" "Bash(cat:*)" "Bash(git:*)" "Bash(head:*)" "Bash(wc:*)" "Bash(grep:*)" "Bash(sed:*)" "Bash(cp:*)" "Edit" "Read" "Write"

      - name: Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin hexo-source || true
          git push origin hexo-source || echo "Nothing to push"

      - name: Deploy to gh-pages
        run: |
          cd fengye404.github.io
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          sed -i "s|repo: https://github.com/fengye404/blog|repo: https://x-access-token:${GITHUB_TOKEN}@github.com/fengye404/blog|" _config.yml
          npm install
          npx hexo generate
          npx hexo deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Close issue with comment
        if: success() && github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '✅ 已收藏！文章已保存到仓库。'
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });
